name: Trigger update more frequently

on:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  actions: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Dispatch update workflow
        run: |
          gh workflow run update.yml --ref "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ github.token }}
